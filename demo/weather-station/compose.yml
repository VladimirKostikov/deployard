name: weather-station

services:

  weather-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      APP_NAME: weather-station
      PORT: 3000
    ports:
      - "3200:3000"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health || exit 1']
      interval: 5s
      timeout: 5s
      retries: 5

  weather-web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3201:80"
    depends_on:
      - weather-api
