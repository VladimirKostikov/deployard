name: demo-shop

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    ports:
      - "5433:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shop -d shop']
      interval: 5s
      timeout: 5s
      retries: 10

  demo-api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: shop
      DATABASE_USER: shop
      DATABASE_PASSWORD: shop
      APP_VERSION: 1.0.0
      PORT: 3000
    ports:
      - "3100:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000/health >/dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "3101:80"
    depends_on:
      - demo-api
