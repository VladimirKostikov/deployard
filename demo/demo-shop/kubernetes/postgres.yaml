apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: demo-db-data
  namespace: default
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: demo-shop

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-db
  namespace: default
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: demo-shop

spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: demo-db

  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-db
        app.kubernetes.io/part-of: demo-shop

    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                  name: demo-db-env

          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data

          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - shop
                - -d
                - shop
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - shop
                - -d
                - shop
            initialDelaySeconds: 15
            periodSeconds: 10

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: demo-db-data

---
apiVersion: v1
kind: Service

metadata:
  name: demo-db
  namespace: default
  labels:
    app.kubernetes.io/name: demo-db
    app.kubernetes.io/part-of: demo-shop

spec:
  selector:
    app.kubernetes.io/name: demo-db

  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
