apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-web
  namespace: default
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: demo-shop

spec:
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: demo-web

  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-web
        app.kubernetes.io/part-of: demo-shop

    spec:
      containers:
        - name: web
          image: demo-shop-web:local
          imagePullPolicy: Never

          ports:
            - containerPort: 80

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: demo-web
  namespace: default
  labels:
    app.kubernetes.io/name: demo-web
    app.kubernetes.io/part-of: demo-shop

spec:
  type: NodePort

  selector:
    app.kubernetes.io/name: demo-web

  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081
