{{- if .Values.api.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dpd.api.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dpd.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
type: Opaque
stringData:
  JWT_SECRET: {{ required "api.secrets.jwtSecret is required when api.secrets.create=true" .Values.api.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ include "dpd.databaseUrl" . | quote }}
  DEPLOY_WEBHOOK_SECRET: {{ .Values.api.secrets.webhookSecret | quote }}
{{- end }}
