apiVersion: apps/v1
kind: Deployment

metadata:
  name: demo-api
  namespace: default
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: demo-shop

spec:
  replicas: 2

  selector:
    matchLabels:
      app.kubernetes.io/name: demo-api

  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-api
        app.kubernetes.io/part-of: demo-shop

    spec:
      containers:
        - name: api
          image: demo-shop-api:local
          imagePullPolicy: Never

          ports:
            - containerPort: 3000

          env:
            - name: DATABASE_HOST
              value: demo-db
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: demo-db-env
                  key: POSTGRES_DB
            - name: DATABASE_USER
              valueFrom:
                secretKeyRef:
                  name: demo-db-env
                  key: POSTGRES_USER
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-db-env
                  key: POSTGRES_PASSWORD
            - name: APP_VERSION
              value: "1.0.0"
            - name: PORT
              value: "3000"

          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service

metadata:
  name: demo-api
  namespace: default
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: demo-shop

spec:
  selector:
    app.kubernetes.io/name: demo-api

  ports:
    - name: http
      port: 3000
      targetPort: 3000
