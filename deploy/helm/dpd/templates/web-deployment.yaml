apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dpd.web.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dpd.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "dpd.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "dpd.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      securityContext:
        runAsNonRoot: {{ .Values.web.securityContext.runAsNonRoot }}
        runAsUser: {{ .Values.web.securityContext.runAsUser }}
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.web.image.tag }}"
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: {{ .Values.web.securityContext.allowPrivilegeEscalation }}
            readOnlyRootFilesystem: {{ .Values.web.securityContext.readOnlyRootFilesystem }}
          ports:
            - containerPort: {{ .Values.web.port }}
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "dpd.web.fullname" . }}-nginx
